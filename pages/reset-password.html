<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoola</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fav icon -->
    <link rel="shortcut icon" href="../assets/img/fav-icon/yoola-fav-icon.png" type="image/x-icon">

    <!-- custom css -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/log-in.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <section class="login-area flex items-center justify-center m-auto h-screen px-4">
        <div
            class="login-content flex flex-col items-center justify-center gap-4 lg:gap-[30px] bg-white p-4 lg:px-[30px] lg:py-10  border border-[#E2E6EA] rounded-[16px]  lg:min-w-[533px]">
            <div class="logo">
                <img class="w-[60px] h-[60px] object-cover lg:w-full lg:h-full" src="../assets/img/logo/login-logo.png"
                    alt="">
            </div>

            <div class="title flex flex-col items-center gap-[2px]">
                <h5 class="font-bold text-[22px] tracking-[-0.01em] text-[#0D1828]">Reset password</h5>
                <p class="font-normal text-base  tracking-[-0.01em] text-[#8D9BAD]">Enter your email to receive a reset
                    link</p>
            </div>
            <div class="form w-full">
                <form action="#">

                    <div class="input-item mb-7">
                        <div class="flex">
                            <label>Email</label>

                        </div>
                        <div class="relative mt-[6px]">
                            <input type="email" placeholder="admin@yoola.sn">
                            <div class="img absolute left-4 top-[51.4%] -translate-y-1/2">
                                <img src="../assets/img/icons/envelope-01.png" alt="">
                            </div>
                        </div>
                    </div>

                    <div class="login-btn">
                        <button
                            class="bg-[#FBBF24] hover:bg-transparent hover:text-[#FBBF24] text-white font-medium h-10 lg:h-12 px-7 rounded-full border border-[#FBBF24] transition-all duration-300 ease-in-out w-full flex items-center gap-2 items-center justify-center">
                            Send Reset Link
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <a href="../pages/log-in.html"
                        class="text-[#8D9BAD] text-base font-normal text-center flex items-center justify-center mt-4 gap-3 transition duration-300 hover:text-[#FBBF24]">
                        <i class="fa-solid fa-arrow-left"></i>
                        Back to Sign In
                    </a>
                </form>
            </div>
        </div>
    </section>


    <!-- js link -->
    <script src="../js/toggle-password.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoola</title>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fav icon -->
    <link rel="shortcut icon" href="../assets/img/fav-icon/yoola-fav-icon.png" type="image/x-icon">

    <!-- custom css -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/log-in.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <section class="login-area new-pass-login-area flex items-center justify-center m-auto h-screen px-4">
        <div class="p-4 lg:px-[30px] lg:py-10 bg-white border border-[#E2E6EA] rounded-[16px]">
            <div
                class="login-content new-pass-login-content flex flex-col items-center justify-center gap-4 lg:gap-[30px]  lg:min-w-[533px]">
                <div class="logo">
                    <img class="w-[60px] h-[60px] object-cover lg:w-full lg:h-full"
                        src="../assets/img/logo/login-logo.png" alt="">
                </div>

                <div class="title flex flex-col items-center gap-[2px]">
                    <h5 class="font-bold text-[22px] tracking-[-0.01em] text-[#0D1828]">Set new password</h5>
                    <p class="font-normal text-base text-center tracking-[-0.01em] text-[#8D9BAD]">Create a strong
                        password
                        for your account</p>
                </div>
                <div class="form w-full">
                    <form action="#">

                        <div class="input-item mb-6">
                            <div class="flex items-center justify-between">
                                <label>Password</label>
                            </div>

                            <div class="w-full">
                                <div class="relative mt-[6px]">
                                    <input id="password" name="password" type="password"
                                        placeholder="Enter new password" class="w-full pl-10 pr-10 py-2 border rounded">

                                    <!-- Left icon -->
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2">
                                        <img src="../assets/img/icons/lock-01.png" alt="">
                                    </div>

                                    <!-- Toggle button -->
                                    <button type="button" id="togglePassword"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8D9BAD]">

                                        <i class="fa-regular fa-eye-slash show__password"></i>
                                        <i class="fa-regular fa-eye hidden hide__password"></i>
                                    </button>
                                </div>
                                <div class="grid grid-cols-5 gap-2 mt-4 pass__label__character__full">
                                    <span class="pass__label col-span-1"></span>
                                    <span class="pass__label col-span-1"></span>
                                    <span class="pass__label col-span-1"></span>
                                    <span class="pass__label col-span-1"></span>
                                    <span class="pass__label col-span-1"></span>
                                </div>
                            </div>
                        </div>

                        <div class="input-item mb-[30px]">
                            <div class="flex items-center justify-between">
                                <label>Cofirm Password</label>
                            </div>
                            <div class="w-full">
                                <div class="relative mt-[6px]">
                                    <input id="confirmPassword" name="confirmPassword" type="password"
                                        placeholder="Confirm new password"
                                        class="w-full pl-10 pr-10 py-2 border rounded">

                                    <!-- Left icon -->
                                    <div class="absolute left-4 top-1/2 -translate-y-1/2">
                                        <img src="../assets/img/icons/lock-01.png" alt="">
                                    </div>

                                    <!-- Toggle button -->
                                    <button type="button" id="togglePassword"
                                        class="absolute right-4 top-1/2 -translate-y-1/2 text-[#8D9BAD]">

                                        <i class="fa-regular fa-eye-slash show__password"></i>
                                        <i class="fa-regular fa-eye hidden hide__password"></i>
                                    </button>
                                </div>
                                <p id="alertBox"
                                    class="alert text-sm text-[#EF4444] mt-2 max-h-0 opacity-0 overflow-hidden transition-all duration-300">
                                    Password do not match
                                </p>
                                <div class="pass__rules mt-[30px] bg-[#F1F3F5] p-4 rounded-[8px]">
                                    <h3 class="text-[#8D9BAD] text-[15px] font-medium uppercase mb-4">Password
                                        requirements
                                    </h3>
                                    <ul class="flex flex-col gap-2">
                                        <li class="flex items-center gap-[10px] text-lg font-normal text-[#8D9BAD]">
                                            <i class="fa-regular fa-circle-check"></i>
                                            At least 8 characters
                                        </li>
                                        <li class="flex items-center gap-[10px] text-lg font-normal text-[#8D9BAD]">
                                            <i class="fa-regular fa-circle-check"></i>
                                            One uppercase letter
                                        </li>
                                        <li class="flex items-center gap-[10px] text-lg font-normal text-[#8D9BAD]">
                                            <i class="fa-regular fa-circle-check"></i>
                                            One lowercase letter
                                        </li>
                                        <li class="flex items-center gap-[10px] text-lg font-normal text-[#8D9BAD]">
                                            <i class="fa-regular fa-circle-check"></i>
                                            One number
                                        </li>
                                        <li class="flex items-center gap-[10px] text-lg font-normal text-[#8D9BAD]">
                                            <i class="fa-regular fa-circle-check"></i>
                                            One special character
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="login-btn">
                            <button
                                class="bg-[#FBBF24] hover:bg-transparent hover:text-[#FBBF24] text-white font-medium h-10 lg:h-12 px-7 rounded-full border border-[#FBBF24] transition-all duration-300 ease-in-out w-full flex items-center gap-2 items-center justify-center">
                                Update Password
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>


    <!-- js link -->
    <script src="../js/toggle-password.js"></script>
    <script src="../js/password-requirements-update.js"></script>
</body>

</html>
